// android/app/build.gradle
// Complete configuration for Solana Mobile Seeker

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "com.facebook.react"
    id "com.google.gms.google-services"
}

react {
    /* Folders */
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
}

android {
    namespace "com.deeppulse"
    compileSdk 36

    defaultConfig {
        applicationId "com.deeppulse"
        minSdk 26  // CRITICAL: Solana Mobile minimum requirement
        targetSdk 34
        versionCode 1
        versionName "2.0.0"
        
        // Solana Mobile Wallet Adapter
        manifestPlaceholders = [
            'walletAuthenticationUrl': 'https://deeppulse.app/auth'
        ]
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file('deep-pulse-release.keystore')
            storePassword 'DeepPulse2026!'
            keyAlias 'deep-pulse'
            keyPassword 'DeepPulse2026!'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packagingOptions {
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
    }
}

def jscFlavor = 'org.webkit:android-jsc:+'

configurations.configureEach {
    resolutionStrategy {
        // Pin androidx.core to 1.13.x which is compatible with AGP 8.6
        force 'androidx.core:core:1.13.1'
        force 'androidx.core:core-ktx:1.13.1'
        // Pin kotlin-stdlib to match MWA clientlib 2.0.3
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.1.0")
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // Autolinked React Native modules
    implementation project(':react-native-async-storage_async-storage')
    implementation project(':react-native-gesture-handler')
    implementation project(':react-native-get-random-values')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-screens')
    implementation project(':react-native-svg')
    implementation project(':react-native-vector-icons')
    implementation project(':solana-mobile_mobile-wallet-adapter-protocol')
    implementation project(':solana-mobile_mobile-wallet-adapter-walletlib')
    implementation project(':react-native-firebase_app')
    implementation project(':react-native-firebase_messaging')

    // CRITICAL: Solana Mobile Wallet Adapter (native Kotlin lib)
    implementation 'com.solanamobile:mobile-wallet-adapter-clientlib-ktx:2.0.3'

    // Firebase (managed by @react-native-firebase packages above)

    // Debug tools
    debugImplementation("com.facebook.flipper:flipper:${FLIPPER_VERSION}")
    debugImplementation("com.facebook.flipper:flipper-network-plugin:${FLIPPER_VERSION}") {
        exclude group:'com.squareup.okhttp3', module:'okhttp'
    }
    debugImplementation("com.facebook.flipper:flipper-fresco-plugin:${FLIPPER_VERSION}")

    // Hermes
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// Note: native_modules.gradle removed - React Native 0.76+ uses the
// com.facebook.react Gradle plugin for autolinking instead

// Copy vector icon fonts to assets
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")
